<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Interview — muse_talk</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #222222;
    --accent: #c8f060;
    --accent-dim: #8aaa30;
    --text: #f0f0f0;
    --text-dim: #666;
    --red: #ff4444;
    --radius: 12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--accent); }

  #status-badge {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--text-dim);
    transition: all 0.3s;
  }

  #status-badge.live {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 12px rgba(200, 240, 96, 0.2);
  }

  #status-badge.recording {
    border-color: var(--red);
    color: var(--red);
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.4); }
    50% { box-shadow: 0 0 0 6px rgba(255, 68, 68, 0); }
  }

  /* ── Main layout ── */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 0;
    overflow: hidden;
  }

  /* ── Candidate video (left, big) ── */
  .candidate-section {
    position: relative;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #candidate-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }

  .candidate-label {
    position: absolute;
    bottom: 20px;
    left: 20px;
    font-size: 11px;
    color: var(--text-dim);
    background: rgba(0,0,0,0.6);
    padding: 4px 10px;
    border-radius: 4px;
    backdrop-filter: blur(4px);
  }

  /* ── AI avatar (corner, small) ── */
  .ai-avatar-container {
    position: absolute;
    bottom: 20px;
    right: 20px;
    width: 180px;
    height: 180px;
    border-radius: var(--radius);
    overflow: hidden;
    border: 2px solid var(--accent);
    box-shadow: 0 0 30px rgba(200, 240, 96, 0.3);
    background: #000;
    z-index: 10;
  }

  #ai-canvas {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .ai-label {
    position: absolute;
    top: 8px;
    left: 8px;
    font-size: 9px;
    color: var(--accent);
    background: rgba(0,0,0,0.7);
    padding: 2px 6px;
    border-radius: 3px;
  }

  /* ── Right panel ── */
  .panel {
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--surface);
    overflow: hidden;
  }

  .panel-section {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }

  .panel-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  /* ── Question display ── */
  #question-text {
    font-family: 'DM Serif Display', serif;
    font-size: 16px;
    line-height: 1.6;
    color: var(--text);
    min-height: 80px;
  }

  #question-text.generating {
    color: var(--text-dim);
    font-style: italic;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
  }

  /* ── Transcript ── */
  .transcript-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
  }

  .transcript-area::-webkit-scrollbar { width: 4px; }
  .transcript-area::-webkit-scrollbar-track { background: transparent; }
  .transcript-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .transcript-entry {
    margin-bottom: 16px;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .transcript-entry .role {
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .transcript-entry.ai .role { color: var(--accent); }
  .transcript-entry.candidate .role { color: var(--text-dim); }

  .transcript-entry .content {
    font-size: 12px;
    line-height: 1.6;
    color: var(--text);
  }

  /* ── Controls ── */
  .controls {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* ── Setup screen ── */
  #setup-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    flex-direction: column;
    gap: 32px;
  }

  .setup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px;
    width: 420px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .setup-title {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    line-height: 1.2;
  }

  .setup-title span { color: var(--accent); }

  .setup-subtitle {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-group label {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .form-group input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-group input:focus { border-color: var(--accent); }

  /* ── Buttons ── */
  .btn {
    padding: 12px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .btn-primary {
    background: var(--accent);
    color: #0a0a0a;
    width: 100%;
  }

  .btn-primary:hover { background: #d4f570; transform: translateY(-1px); }
  .btn-primary:disabled { background: var(--border); color: var(--text-dim); cursor: not-allowed; transform: none; }

  .btn-record {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-record:hover { border-color: var(--text-dim); }

  .btn-record.active {
    border-color: var(--red);
    color: var(--red);
    background: rgba(255, 68, 68, 0.1);
  }

  .record-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: currentColor;
  }

  .btn-record.active .record-dot { animation: blink 1s infinite; }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* ── Progress bar ── */
  .progress-bar {
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 1px;
    transition: width 0.3s;
    width: 0%;
  }

  /* ── Camera preview in setup ── */
  #camera-preview {
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    border-radius: 8px;
    border: 1px solid var(--border);
    object-fit: cover;
    transform: scaleX(-1);
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- Setup Screen -->
<div id="setup-screen">
  <div class="setup-card">
    <div>
      <div class="setup-title">AI <span>Interview</span></div>
      <div class="setup-subtitle" style="margin-top:8px">
        Your camera will be shown full screen. The AI interviewer appears in the corner.
      </div>
    </div>

    <video id="camera-preview" autoplay muted playsinline></video>

    <div class="form-group">
      <label>Your Name</label>
      <input type="text" id="candidate-name" placeholder="Enter your name" value="Candidate" />
    </div>

    <button class="btn btn-primary" id="start-btn" disabled>
      Starting camera...
    </button>
  </div>
</div>

<!-- Main Interview UI -->
<div id="interview-ui" class="hidden">
  <header>
    <div class="logo">muse<span>_talk</span></div>
    <div id="status-badge">Connecting...</div>
  </header>

  <main>
    <!-- Left: Candidate video (big) -->
    <div class="candidate-section">
      <video id="candidate-video" autoplay muted playsinline></video>
      <div class="candidate-label" id="candidate-name-label">You</div>

      <!-- AI Avatar (corner) -->
      <div class="ai-avatar-container">
        <canvas id="ai-canvas"></canvas>
        <div class="ai-label">AI Interviewer</div>
      </div>
    </div>

    <!-- Right panel -->
    <div class="panel">
      <div class="panel-section">
        <div class="panel-label">Current Question</div>
        <div id="question-text">Connecting to interviewer...</div>
        <div class="progress-bar" style="margin-top:12px">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>

      <div class="transcript-area" id="transcript"></div>

      <div class="controls">
        <button class="btn btn-record" id="record-btn" disabled>
          <div class="record-dot"></div>
          <span id="record-label">Wait for question...</span>
        </button>
        <div style="font-size:10px; color:var(--text-dim); text-align:center" id="hint-text">
          Press record after the AI finishes speaking
        </div>
      </div>
    </div>
  </main>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let ws = null;
let mediaStream = null;
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let avatarB64 = null;
let audioContext = null;
let videoFrames = [];
let frameIndex = 0;
let frameTimer = null;
let isPlayingVideo = false;

// ── Camera setup ─────────────────────────────────────────────────────────────
async function initCamera() {
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      video: { width: 1280, height: 720, facingMode: 'user' },
      audio: true
    });

    document.getElementById('camera-preview').srcObject = mediaStream;
    document.getElementById('candidate-video').srcObject = mediaStream;

    // Capture avatar frame
    await captureAvatarFrame();

    document.getElementById('start-btn').disabled = false;
    document.getElementById('start-btn').textContent = 'Start Interview';
  } catch (err) {
    document.getElementById('start-btn').textContent = 'Camera access required';
    console.error('Camera error:', err);
  }
}

async function captureAvatarFrame() {
  const video = document.getElementById('camera-preview');
  await new Promise(r => setTimeout(r, 500)); // wait for video to load
  const canvas = document.createElement('canvas');
  canvas.width = 512;
  canvas.height = 512;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, 512, 512);
  avatarB64 = canvas.toDataURL('image/jpeg', 0.9).split(',')[1];
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connectWS() {
  ws = new WebSocket('ws://localhost:3000');

  ws.onopen = () => {
    updateStatus('Connected', 'live');
  };

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    handleMessage(msg);
  };

  ws.onclose = () => {
    updateStatus('Disconnected', '');
    setTimeout(connectWS, 3000);
  };

  ws.onerror = (err) => {
    console.error('WS error:', err);
  };
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'connected':
      // Ready — start interview
      startInterview();
      break;

    case 'generating':
      updateQuestion(msg.text, true);
      updateStatus('Generating...', '');
      break;

    case 'status':
      updateHint(msg.message);
      break;

    case 'video_ready':
      updateQuestion(msg.text, false);
      addTranscript('ai', msg.text);
      playVideoFrames(msg.frames, msg.audio_b64, msg.duration_ms);
      break;

    case 'interview_complete':
      updateStatus('Interview Complete', 'live');
      updateHint('Thank you! The interview is complete.');
      document.getElementById('record-btn').disabled = true;
      break;

    case 'error':
      console.error('Server error:', msg.message);
      updateHint('Error: ' + msg.message);
      break;
  }
}

// ── Interview start ───────────────────────────────────────────────────────────
function startInterview() {
  const name = document.getElementById('candidate-name').value || 'Candidate';
  ws.send(JSON.stringify({
    type: 'start_interview',
    avatar_b64: avatarB64,
    candidate_name: name,
  }));
  document.getElementById('candidate-name-label').textContent = name;
}

// ── Video frame playback ──────────────────────────────────────────────────────
function playVideoFrames(frames, audioB64, durationMs) {
  // Stop any current playback
  if (frameTimer) clearInterval(frameTimer);

  videoFrames = frames;
  frameIndex = 0;
  isPlayingVideo = true;

  const canvas = document.getElementById('ai-canvas');
  const ctx = canvas.getContext('2d');

  // Play audio
  if (audioB64 && audioContext) {
    const audioData = base64ToArrayBuffer(audioB64);
    audioContext.decodeAudioData(audioData, (buffer) => {
      const source = audioContext.createBufferSource();
      source.buffer = buffer;
      source.connect(audioContext.destination);
      source.start(0);
    });
  }

  // Play frames at 25fps
  const msPerFrame = 1000 / 25;
  frameTimer = setInterval(() => {
    if (frameIndex >= videoFrames.length) {
      clearInterval(frameTimer);
      isPlayingVideo = false;
      // Enable recording after AI finishes
      enableRecording();
      return;
    }

    const frame = videoFrames[frameIndex];
    const img = new Image();
    img.onload = () => {
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);
    };
    img.src = 'data:image/jpeg;base64,' + frame.frame_b64;
    frameIndex++;
  }, msPerFrame);
}

function base64ToArrayBuffer(b64) {
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes.buffer;
}

// ── Recording ─────────────────────────────────────────────────────────────────
function enableRecording() {
  updateStatus('Your turn', 'live');
  updateHint('Click record to answer');
  document.getElementById('record-btn').disabled = false;
  document.getElementById('record-label').textContent = 'Hold to Record';
}

function toggleRecording() {
  if (!isRecording) {
    startRecording();
  } else {
    stopRecording();
  }
}

function startRecording() {
  isRecording = true;
  audioChunks = [];
  updateStatus('Recording', 'recording');
  document.getElementById('record-btn').classList.add('active');
  document.getElementById('record-label').textContent = 'Recording... (click to stop)';
  document.getElementById('record-btn').disabled = false;

  const audioStream = new MediaStream(mediaStream.getAudioTracks());
  mediaRecorder = new MediaRecorder(audioStream, { mimeType: 'audio/webm' });

  mediaRecorder.ondataavailable = (e) => {
    if (e.data.size > 0) audioChunks.push(e.data);
  };

  mediaRecorder.onstop = async () => {
    const blob = new Blob(audioChunks, { type: 'audio/webm' });
    await sendAudioForTranscription(blob);
  };

  mediaRecorder.start();
}

function stopRecording() {
  isRecording = false;
  document.getElementById('record-btn').classList.remove('active');
  document.getElementById('record-label').textContent = 'Processing...';
  document.getElementById('record-btn').disabled = true;
  updateStatus('Processing...', '');

  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
}

async function sendAudioForTranscription(blob) {
  // Convert to base64 and send to server for Soniox STT
  const reader = new FileReader();
  reader.onloadend = () => {
    const b64 = reader.result.split(',')[1];
    ws.send(JSON.stringify({
      type: 'audio_answer',
      audio_b64: b64,
      mime_type: 'audio/webm',
    }));
    updateHint('Transcribing your answer...');
  };
  reader.readAsDataURL(blob);
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function updateStatus(text, cls) {
  const badge = document.getElementById('status-badge');
  badge.textContent = text;
  badge.className = cls ? `${cls}` : '';
  badge.id = 'status-badge';
}

function updateQuestion(text, generating) {
  const el = document.getElementById('question-text');
  el.textContent = generating ? 'Generating response...' : text;
  el.className = generating ? 'generating' : '';
}

function updateHint(text) {
  document.getElementById('hint-text').textContent = text;
}

function addTranscript(role, text) {
  const area = document.getElementById('transcript');
  const entry = document.createElement('div');
  entry.className = `transcript-entry ${role}`;
  entry.innerHTML = `
    <div class="role">${role === 'ai' ? 'AI Interviewer' : 'You'}</div>
    <div class="content">${text}</div>
  `;
  area.appendChild(entry);
  area.scrollTop = area.scrollHeight;
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', async () => {
  audioContext = new (window.AudioContext || window.webkitAudioContext)();
  document.getElementById('setup-screen').classList.add('hidden');
  document.getElementById('interview-ui').classList.remove('hidden');
  connectWS();
});

document.getElementById('record-btn').addEventListener('click', toggleRecording);

// Init camera on load
initCamera();
</script>
</body>
</html>
